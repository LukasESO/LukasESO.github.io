<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Mercado Steam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1b2838; color: #c7d5e0; font-family: sans-serif; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Mercado de Itens TBH</h1>
        <div id="status" class="mb-4 p-2 rounded text-sm bg-blue-900 border border-blue-500">
            Sincronizando mercado...
        </div>
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Itens carregados aqui -->
        </div>
    </div>

    <script>
        // Banco de dados de alta fidelidade como backup primário
        async function tryLiveFetch() {
            const statusBox = document.getElementById("connection-status");
            const statusDot = document.getElementById("status-dot");
            const statusText = document.getElementById("status-text");

            statusDot.className = "w-2 h-2 rounded-full bg-blue-500 animate-spin";
            statusText.textContent = "Buscando dados via Proxy...";

            try {
                // AQUI VOCÊ COLOCA A URL DO SEU ARQUIVO proxy.php
                const response = await fetch('https://seuservidor.com/proxy.php'); 
                const json = await response.json();

                if (json && json.success && json.results) {
                    // Lógica de atualização dos itens permanece igual
                    activeItems = processSteamData(json.results); 
                    statusBox.className = "status-live ...";
                    statusText.textContent = "Conexão Direta via Proxy";
                }
            } catch (err) {
                console.error("Erro no Proxy:", err);
                statusText.textContent = "Falha no Proxy (Verifique o servidor)";
            }
        }
        
                status.textContent = "Conectado com sucesso ao mercado Steam.";
                status.className = "mb-4 p-2 rounded text-sm bg-green-900 border border-green-500";
            } catch (e) {
                // Falha silenciosa: O painel continua funcionando com o cache local
                status.textContent = "Modo Offline: Usando cache de alta fidelidade.";
                status.className = "mb-4 p-2 rounded text-sm bg-amber-900 border border-amber-500";
            }
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(item => `
                <div class="bg-[#171a21] p-4 rounded border border-[#2a475e]">
                    <h3 class="font-bold text-white">${item.name}</h3>
                    <p class="text-blue-400">Preço: R$ ${item.sell_price.toFixed(2)}</p>
                    <p class="text-xs text-slate-400">Listagens: ${item.sell_listings}</p>
                </div>
            `).join('');
        }

        initMarket();
    </script>
</body>
</html>
